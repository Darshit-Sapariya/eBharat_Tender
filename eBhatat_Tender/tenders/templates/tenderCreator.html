{% extends "base1.html" %}
{% block content %}

<style>
/* ===== 3D CARD EFFECT ===== */
.card-3d {
    border-radius: 16px;
    background: #ffffff;
    border: 1px solid #e3e6ea;
    box-shadow: 
        0 4px 8px rgba(0,0,0,0.04),
        0 8px 20px rgba(0,0,0,0.06);
    transition: all 0.25s ease;
}

.card-3d:hover {
    transform: translateY(-4px);
    box-shadow:
        0 10px 25px rgba(0,0,0,0.08),
        0 18px 40px rgba(0,0,0,0.10);
}

.section-title {
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-bottom: 1rem;
    border-bottom: 1px solid #dee2e6;
    padding-bottom: 6px;
}

.form-label {
    font-size: 0.85rem;
    font-weight: 600;
}

.form-control,
.form-select {
    font-size: 0.9rem;
    padding: 8px 12px;
    border-radius: 8px;
}

textarea.form-control {
    min-height: 70px;
}

body {
    font-size: 15px;
}
</style>

<section class="min-vh-100 bg-light py-4">
<div class="container-fluid px-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h5 class="fw-bold mb-1">Create New Tender</h5>
            <small class="text-muted">
                Official Procurement Publication Form
            </small>
        </div>
        <a href="{% url 'tenders:mytenders' %}" class="btn btn-sm btn-outline-dark">
            Back
        </a>
    </div>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="row g-4">

            <!-- LEFT COLUMN -->
            <div class="col-lg-6">

                <div class="card card-3d p-3 mb-4">
                    <div class="section-title text-primary">
                        Basic Information
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Tender Title</label>
                        <input type="text" class="form-control" name="title" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Department</label>
                        <input type="text" class="form-control" name="department" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Category</label>
                        <select class="form-select" name="category" required>
                            <option disabled selected>Select</option>
                            <option>Infrastructure</option>
                            <option>Construction</option>
                            <option>Road & Highway</option>
                            <option>Water Supply</option>
                            <option>IT & Software</option>
                            <option>Healthcare</option>
                            <option>Education</option>
                            <option>Energy & Power</option>
                        </select>
                    </div>

                    <div>
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description"></textarea>
                    </div>
                </div>

                <div class="card card-3d p-3">
                    <div class="section-title text-success">
                        Financial Details
                    </div>

                    <div class="row g-2">
                        <div class="col-md-6">
                            <label class="form-label">Estimated Value</label>
                            <input type="number" class="form-control" name="estimated_value">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">EMD Amount</label>
                            <input type="number" class="form-control" name="emd_amount">
                        </div>
                    </div>
                </div>

            </div>

            <!-- RIGHT COLUMN -->
            <div class="col-lg-6">

                <div class="card card-3d p-3 mb-4">
                    <div class="section-title text-warning">
                        Important Dates
                    </div>

                    <div class="row g-2">
                        <div class="col-md-4">
                            <label class="form-label">Publish</label>
                            <input type="date" class="form-control" name="publish_date">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Closing</label>
                            <input type="date" class="form-control" name="closing_date" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Pre-Bid</label>
                            <input type="datetime-local" class="form-control" name="pre_bid_meeting">
                        </div>
                    </div>
                </div>

                <div class="card card-3d p-3 mb-4">
                    <div class="section-title text-info">
                        Project Details
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Location</label>
                        <input type="text" class="form-control" name="location">
                    </div>

                    <div>
                        <label class="form-label">Status</label>
                        <select class="form-select" name="status">
                            <option value="draft">Draft</option>
                            <option value="open">Open</option>
                            <option value="closed">Closed</option>
                        </select>
                    </div>
                </div>

                <div class="card card-3d p-3">
                    <div class="section-title text-danger">
                        Documents
                    </div>

                    <input type="file" class="form-control" name="document" multiple>
                    <small class="text-muted">
                        PDF, DOCX, XLSX, ZIP
                    </small>
                </div>

            </div>

        </div>

        <!-- BUTTONS -->
        <div class="d-flex justify-content-end gap-2 mt-4">
            <a href="/dashboard/" class="btn btn-sm btn-outline-secondary">
                Cancel
            </a>
            <button type="submit" class="btn btn-sm btn-primary">
                Publish Tender
            </button>
        </div>

    </form>

</div>
</section>

{% endblock %}
