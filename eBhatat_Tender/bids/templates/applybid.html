{% extends "base.html" %}
{% block content %}

<!-- ══════ PAGE WRAPPER ══════ -->
<div class="flex flex-col gap-6 max-w-[1000px] mx-auto 
            xs:pt-6 sm:pt-14 md:pt-16 lg:pt-20 xl:pt-24 mt-4
            px-4 sm:px-6 md:px-8 mb-20 bg-slate-50 min-h-screen">

  <!-- ══════ HERO OVERVIEW ══════ -->
  <div class="relative flex items-center justify-between gap-6 flex-wrap px-8 py-7 rounded-2xl overflow-hidden"
       style="background: linear-gradient(135deg, #09193a 0%, #0f2a5e 52%, #163472 100%);"
              box-shadow:0 8px 24px rgba(59,130,246,0.15);">
              
    <!-- Decorative overlapping circles -->
    <div class="absolute rounded-full border-[1.5px] pointer-events-none"
         style="width:260px; height:260px; right:-60px; top:-80px; border-color:rgba(255,255,255,0.08);"></div>
    <div class="absolute rounded-full border-[1.5px] pointer-events-none"
         style="width:160px; height:160px; right:40px; bottom:-60px; border-color:rgba(255,255,255,0.05);"></div>

    <!-- Grid texture -->
    <div class="absolute inset-0 pointer-events-none bg-[size:28px_28px]"
         style="background-image:linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                                 linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);"></div>

    <div class="relative z-[1] flex-1 min-w-0">
      <div class="flex items-center gap-2 text-[0.75rem] font-bold tracking-[0.08em] uppercase mb-[0.3rem]" style="color:#bfdbfe;">
        <i class="fas fa-file-contract"></i> Official Tender Application
      </div>
      <h1 class="font-sora text-[1.6rem] font-extrabold text-white leading-[1.3] mb-0">
        {{ tender.title }}
      </h1>
    </div>
  </div>

  <!-- ══════ FORM PANEL ══════ -->
  <div class="bg-white border border-slate-200 rounded-2xl overflow-hidden"
       style="box-shadow:0 4px 20px rgba(15,42,94,0.06);">
    
    <form method="POST" enctype="multipart/form-data" class="show-loader p-8 max-sm:p-5">
      {% csrf_token %}
      
      <!-- Company Details -->
      <div class="flex items-center gap-[10px] font-sora text-[1.1rem] font-bold text-slate-800 mb-6 pb-3 border-b-2 border-slate-100">
        <i class="fas fa-building text-blue-500"></i> 1. Company Information
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-[1.25rem] mb-[2rem]">
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Company Name</label>
          <input type="text" name="company_name" required placeholder="Registered Entity Name"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">GST Number</label>
          <input type="text" name="gst_number" required placeholder="22AAAAA0000A1Z5"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
        <div class="flex flex-col gap-[0.4rem] md:col-span-2">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Registered Address</label>
          <textarea name="registered_address" required placeholder="Full street address"
                    class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium min-h-[90px] resize-y"></textarea>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-3 gap-[1.25rem] mb-[2rem]">
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">City</label>
          <input type="text" name="city" required placeholder="City"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">State</label>
          <input type="text" name="state" required placeholder="State"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">PIN Code</label>
          <input type="text" name="pin_code" required placeholder="000000"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
      </div>

      <div class="flex flex-col gap-[0.4rem] mb-[2.5rem]">
        <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Upload GST Certificate (PDF)</label>
        <input type="file" name="gst_document" accept=".pdf,.jpeg,.jpg,.png" required
               class="block w-full text-[0.8rem] text-slate-500 bg-slate-50 border-[1.5px] border-dashed border-slate-300 rounded-xl p-[0.6rem] cursor-pointer transition-all duration-200 hover:border-blue-400 hover:bg-slate-100
                      file:bg-white file:border-[1.5px] file:border-slate-200 file:rounded-md file:px-4 file:py-2 file:mr-3 file:text-[0.75rem] file:font-semibold file:text-slate-700 file:cursor-pointer file:transition-all file:duration-200 hover:file:border-blue-300 hover:file:text-blue-600 hover:file:bg-blue-50">
      </div>

      <!-- Bidder Details -->
      <div class="flex items-center gap-[10px] font-sora text-[1.1rem] font-bold text-slate-800 mb-6 pb-3 border-b-2 border-slate-100">
        <i class="fas fa-user-tie text-amber-500"></i> 2. Authorized Representative
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-[1.25rem] mb-[2.5rem]">
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Bidder Name</label>
          <input type="text" name="bidder_name" required placeholder="Full Name"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Designation</label>
          <input type="text" name="designation" required placeholder="e.g. Director / Manager"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Official Email</label>
          <input type="email" name="email" required placeholder="email@company.com"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Mobile Number</label>
          <input type="tel" name="mobile" required placeholder="+91"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-blue-400 focus:bg-white focus:ring-[3px] focus:ring-blue-100 placeholder-slate-400 font-medium">
        </div>
      </div>

      <!-- Financial Statements -->
      <div class="flex items-center gap-[10px] font-sora text-[1.1rem] font-bold text-slate-800 mb-6 pb-3 border-b-2 border-slate-100">
        <i class="fas fa-file-invoice-dollar text-emerald-500"></i> 3. Financial Statements
      </div>
      <div class="flex flex-col gap-[0.4rem] mb-[2.5rem]">
        <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">CA Certified Financial Statement (Last 3 Years)</label>
        <input type="file" name="financial_statement" accept=".pdf" required
               class="block w-full text-[0.8rem] text-slate-500 bg-slate-50 border-[1.5px] border-dashed border-slate-300 rounded-xl p-[0.6rem] cursor-pointer transition-all duration-200 hover:border-emerald-400 hover:bg-emerald-50
                      file:bg-white file:border-[1.5px] file:border-slate-200 file:rounded-md file:px-4 file:py-2 file:mr-3 file:text-[0.75rem] file:font-semibold file:text-slate-700 file:cursor-pointer file:transition-all file:duration-200 hover:file:border-emerald-300 hover:file:text-emerald-700 hover:file:bg-emerald-100">
      </div>

      <!-- Bidding Details -->
      <div class="flex items-center gap-[10px] font-sora text-[1.1rem] font-bold text-slate-800 mb-6 pb-3 border-b-2 border-slate-100">
        <i class="fas fa-gavel text-indigo-500"></i> 4. Proposal Documents & Core Bid
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-[1.25rem]">
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Proposed Bid Amount (₹)</label>
          <input type="number" name="bid_amount" required placeholder="0.00"
                 class="w-full px-[1rem] py-[0.75rem] rounded-xl border-[1.5px] border-slate-300 bg-slate-50 font-dmSans text-[0.9rem] text-slate-800 transition-all duration-200 outline-none focus:border-indigo-400 focus:bg-white focus:ring-[3px] focus:ring-indigo-100 placeholder-slate-400 font-bold tracking-wide" style="color:#10b981;">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Technical Proposal</label>
          <input type="file" name="technical_document" accept=".pdf" required
                 class="block w-full text-[0.8rem] text-slate-500 bg-slate-50 border-[1.5px] border-dashed border-slate-300 rounded-xl p-[0.6rem] cursor-pointer transition-all duration-200 hover:border-indigo-400 hover:bg-slate-100
                        file:bg-white file:border-[1.5px] file:border-slate-200 file:rounded-md file:px-3 file:py-[0.35rem] file:mr-2 file:text-[0.7rem] file:font-semibold file:text-slate-700 file:cursor-pointer file:transition-all file:duration-200 hover:file:border-indigo-300 hover:file:text-indigo-600 hover:file:bg-indigo-50">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Financial Proposal</label>
          <input type="file" name="financial_document" accept=".pdf" required
                 class="block w-full text-[0.8rem] text-slate-500 bg-slate-50 border-[1.5px] border-dashed border-slate-300 rounded-xl p-[0.6rem] cursor-pointer transition-all duration-200 hover:border-indigo-400 hover:bg-slate-100
                        file:bg-white file:border-[1.5px] file:border-slate-200 file:rounded-md file:px-3 file:py-[0.35rem] file:mr-2 file:text-[0.7rem] file:font-semibold file:text-slate-700 file:cursor-pointer file:transition-all file:duration-200 hover:file:border-indigo-300 hover:file:text-indigo-600 hover:file:bg-indigo-50">
        </div>
        <div class="flex flex-col gap-[0.4rem]">
          <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Supporting Docs (Experience/Portfolio)</label>
          <input type="file" name="other_document" accept=".pdf,.zip"
                 class="block w-full text-[0.8rem] text-slate-500 bg-slate-50 border-[1.5px] border-dashed border-slate-300 rounded-xl p-[0.6rem] cursor-pointer transition-all duration-200 hover:border-indigo-400 hover:bg-slate-100
                        file:bg-white file:border-[1.5px] file:border-slate-200 file:rounded-md file:px-3 file:py-[0.35rem] file:mr-2 file:text-[0.7rem] file:font-semibold file:text-slate-700 file:cursor-pointer file:transition-all file:duration-200 hover:file:border-indigo-300 hover:file:text-indigo-600 hover:file:bg-indigo-50">
        </div>
      </div>

      <!-- Razorpay Hidden Fields -->
      <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">

      <!-- 5. Funding Assistance (Optional) -->
      {% if fundings %}
      <div class="flex items-center gap-[10px] font-sora text-[1.1rem] font-bold text-slate-800 mb-6 pb-3 border-b-2 border-slate-100 mt-10">
        <i class="fas fa-hand-holding-usd text-purple-500"></i> 5. Funding Assistance (Optional)
      </div>
      
      <div class="bg-purple-50 border border-purple-100 rounded-2xl p-6 mb-8">
        <div class="flex items-center gap-3 mb-4">
          <input type="checkbox" name="apply_funding" id="apply_funding" class="w-5 h-5 text-purple-600 rounded cursor-pointer">
          <label for="apply_funding" class="font-dmSans text-[0.95rem] font-bold text-slate-700 cursor-pointer">
            I want to apply for funding assistance for this tender
          </label>
        </div>

        <div id="funding_fields" class="hidden space-y-5 mt-6 pt-6 border-t border-purple-200">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
            <div class="flex flex-col gap-2">
              <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Select Funding Scheme</label>
              <select name="funding_id" class="w-full px-4 py-3 rounded-xl border-[1.5px] border-slate-300 bg-white font-dmSans text-[0.9rem]">
                <option value="">-- Choose a Scheme --</option>
                {% for f in fundings %}
                  <option value="{{ f.id }}">{{ f.title }} (Max: ₹{{ f.max_amount }})</option>
                {% endfor %}
              </select>
            </div>
            <div class="flex flex-col gap-2">
              <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Amount Requested (₹)</label>
              <input type="number" name="amount_requested" placeholder="0.00" class="w-full px-4 py-3 rounded-xl border-[1.5px] border-slate-300 bg-white font-dmSans text-[0.9rem]">
            </div>
          </div>
          
          <div class="flex flex-col gap-2">
            <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Purpose of Funding</label>
            <textarea name="purpose" placeholder="Briefly explain why you need this funding..." class="w-full px-4 py-3 rounded-xl border-[1.5px] border-slate-300 bg-white font-dmSans text-[0.9rem] min-h-[80px]"></textarea>
          </div>

          <div class="flex flex-col gap-2">
            <label class="font-dmSans text-[0.85rem] font-bold text-slate-700">Supporting Documents (Project Plan/Estimates)</label>
            <input type="file" name="funding_document" accept=".pdf" class="block w-full text-[0.8rem] text-slate-500 bg-white border-[1.5px] border-dashed border-slate-300 rounded-xl p-3">
          </div>
        </div>
      </div>
      
      <script>
        document.getElementById('apply_funding').addEventListener('change', function() {
          const fields = document.getElementById('funding_fields');
          if (this.checked) {
            fields.classList.remove('hidden');
            // Make fields required if applying
            fields.querySelectorAll('input, select, textarea').forEach(el => {
              if (el.type !== 'file' || el.name === 'funding_document') el.required = true;
            });
          } else {
            fields.classList.add('hidden');
            fields.querySelectorAll('input, select, textarea').forEach(el => el.required = false);
          }
        });
      </script>
      {% endif %}

      <!-- Submit -->
      <div class="mt-[3.5rem]">
        <button type="button" id="pay-btn"
                class="w-full inline-flex items-center justify-center gap-[10px] px-6 py-[1.1rem] rounded-[14px] bg-indigo-600 text-white font-sora text-[1.05rem] font-bold border-none cursor-pointer transition-all duration-200 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(79,70,229,0.3)] shadow-[0_4px_16px_rgba(79,70,229,0.2)]">
          <i class="fas fa-paper-plane"></i> 
          {% if tender.emd_amount > 0 %}
            Pay ₹{{ tender.emd_amount }} &amp; Submit Official Tender Application
          {% else %}
            Submit Official Tender Application
          {% endif %}
        </button>
      </div>
      
    </form>
  </div>

</div>

<!-- Razorpay Script -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
  document.getElementById('pay-btn').addEventListener('click', function(e) {
      e.preventDefault();
      
      const form = document.querySelector('form');
      
      // Basic HTML5 validation trigger
      if (!form.checkValidity()) {
          form.reportValidity();
          return;
      }

      {% if tender.emd_amount > 0 %}
      const amountInPaise = Math.round(parseFloat("{{ tender.emd_amount }}") * 100);
      const options = {
          "key": "{{ razorpay_key }}",
          "amount": amountInPaise, 
          "currency": "INR",
          "name": "eBharat Tenders",
          "description": "EMD Payment for {{ tender.tender_id }}",
          "handler": function (response){
              document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
              const loader = document.getElementById('global-loader');
              if (loader) loader.classList.remove('hidden');
              form.submit();
          },
          "prefill": {
              "name": document.querySelector('input[name="company_name"]').value,
              "email": document.querySelector('input[name="email"]').value,
              "contact": document.querySelector('input[name="mobile"]').value
          },
          "theme": {
              "color": "#4f46e5"
          }
      };
      
      const rzp1 = new Razorpay(options);
      rzp1.open();
      {% else %}
      const loader = document.getElementById('global-loader');
      if (loader) loader.classList.remove('hidden');
      form.submit();
      {% endif %}
  });
</script>

{% endblock %}
