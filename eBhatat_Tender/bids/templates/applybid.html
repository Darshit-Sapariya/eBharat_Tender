{% extends "base.html" %}
{% block content %}

<div class="container my-5">
    <div class="card shadow-lg border-0 rounded-4">
        <div class="card-body p-5">

            <!-- Header -->
            <div class="text-center mb-5">
                <h3 class="fw-bold">{{ tender.title }}</h3>
                <p class="text-muted">Tender Application Form</p>
            </div>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                <!-- ================= COMPANY DETAILS ================= -->
                <div class="border rounded-4 p-4 mb-5 bg-light">
                    <h5 class="fw-bold mb-4 text-dark">Company Details</h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Company Name</label>
                            <input type="text" name="company_name" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">GST Number</label>
                            <input type="text" name="gst_number" class="form-control" required>
                        </div>

                        <div class="col-12 mb-3">
                            <label class="form-label">Registered Address</label>
                            <textarea name="registered_address" class="form-control" rows="2" required></textarea>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">City</label>
                            <input type="text" name="city" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">State</label>
                            <input type="text" name="state" class="form-control" required>
                        </div>

                        <div class="col-md-4 mb-3">
                            <label class="form-label">PIN Code</label>
                            <input type="text" name="pin_code" class="form-control" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label">Upload GST Certificate</label>
                            <input type="file" name="gst_document" class="form-control" >
                        </div>
                    </div>
                </div>

                <!-- ================= BIDDER DETAILS ================= -->
                <div class="border rounded-4 p-4 mb-5">
                    <h5 class="fw-bold mb-4 text-dark">Authorized Bidder Details</h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Bidder Name</label>
                            <input type="text" name="bidder_name" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Designation</label>
                            <input type="text" name="designation" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Official Email</label>
                            <input type="email" name="email" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Mobile Number</label>
                            <input type="text" name="mobile" class="form-control" required>
                        </div>
                    </div>
                </div>

                <!-- ================= FINANCIAL DETAILS ================= -->
                <div class="border rounded-4 p-4 mb-5 bg-light">
                    <h5 class="fw-bold mb-4 text-dark">
                        CA Certified Financial Statement (Last 3 Years)
                    </h5>

                    <label class="form-label">Upload Financial Statement (PDF)</label>
                    <input type="file" name="financial_statement" class="form-control" >
                </div>

                <!-- ================= BIDDING DETAILS ================= -->
                <div class="border rounded-4 p-4 mb-4">
                    <h5 class="fw-bold mb-4 text-dark">Bidding Details</h5>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Bid Amount (₹)</label>
                            <input type="number" name="bid_amount" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Technical Document</label>
                            <input type="file" name="technical_document" class="form-control" >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Financial Document</label>
                            <input type="file" name="financial_document" class="form-control" >
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Other Supporting Document (Work Experience)</label>
                            <input type="file" name="other_document" class="form-control">
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-success px-5 py-2 rounded-pill">
                        Submit Tender Application
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

{% endblock %}
