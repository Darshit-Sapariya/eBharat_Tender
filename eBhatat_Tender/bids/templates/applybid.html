{% extends "base2.html" %}
{% block content %}

<style>
  /* ── Dashboard tokens ── */
  :root {
    --card-radius: 16px;
    --card-shadow: 0 2px 16px rgba(15,42,94,0.07);
    --gradient-hero: linear-gradient(135deg, #0a1745 0%, #163472 45%, #1a56db 100%);
  }

  /* ── Page wrapper ── */
  .db-wrap {
    padding: 0;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    max-width: 1000px; /* Keep form contained */
    margin: 0 auto;
  }
  @media (max-width: 640px) { .db-wrap { gap: 1rem; } }

  /* ══════════════════════════════════
     HERO BANNER
  ══════════════════════════════════ */
  .hero-banner {
    background: var(--gradient-hero);
    border-radius: var(--card-radius);
    padding: 1.75rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1.5rem;
    position: relative;
    overflow: hidden;
    flex-wrap: wrap;
    box-shadow: 0 8px 24px rgba(26,86,219,0.15);
  }
  .hero-banner::before, .hero-banner::after {
    content: ''; position: absolute; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.08); pointer-events: none;
  }
  .hero-banner::before { width: 260px; height: 260px; right: -60px; top: -80px; }
  .hero-banner::after { width: 160px; height: 160px; right: 40px; bottom: -60px; border-color: rgba(255,255,255,0.05); }
  
  .hero-grid {
    position: absolute; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .hero-text { position: relative; z-index: 1; min-width: 0; flex: 1; }
  .hero-eyebrow {
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: #a5b4fc; margin-bottom: 0.3rem; 
    display: flex; align-items: center; gap: 6px;
  }
  .hero-title {
    font-family: 'Sora', sans-serif; font-size: 1.5rem; font-weight: 800; 
    color: #fff; line-height: 1.3; margin-bottom: 0.35rem;
  }

  /* ══════════════════════════════════
     PROFILE PANEL & FORM
  ══════════════════════════════════ */
  .panel {
    background: white; border: 1px solid var(--border);
    border-radius: var(--card-radius); box-shadow: var(--card-shadow);
    overflow: hidden; padding: 2.5rem 3rem;
  }
  @media(max-width: 768px) { .panel { padding: 1.5rem; } }

  .form-section-title {
    font-family: 'Sora', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--navy);
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
    padding-bottom: 0.75rem;
    border-bottom: 2px solid var(--surface-2);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.25rem 1.5rem;
    margin-bottom: 2.5rem;
  }
  @media(max-width: 768px) { .form-grid { grid-template-columns: 1fr; } }
  .form-grid.single { grid-template-columns: 1fr; }

  .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
  
  .form-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--navy);
  }

  .form-input, .form-textarea {
    width: 100%;
    padding: 0.75rem 1.1rem;
    border-radius: 10px;
    border: 1.5px solid var(--border);
    background: #fcfdfd;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--text);
    transition: all 0.2s;
  }
  .form-textarea { resize: vertical; min-height: 80px; }
  
  .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--blue-light);
    background: white;
    box-shadow: 0 0 0 4px rgba(59,130,246,0.12);
  }

  .form-control-file {
    display: block; width: 100%; font-size: 0.8rem; color: var(--muted);
    background: white; border: 1.5px dashed var(--border); border-radius: 10px;
    padding: 0.5rem; cursor: pointer; transition: all 0.2s;
  }
  .form-control-file:hover { border-color: var(--blue-light); background: #f8fafc; }
  .form-control-file::file-selector-button {
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 6px; padding: 0.4rem 0.8rem; margin-right: 0.75rem;
    font-family: 'DM Sans', sans-serif; font-size: 0.75rem; font-weight: 600;
    color: var(--navy); cursor: pointer; transition: all 0.2s;
  }
  .form-control-file::file-selector-button:hover { background: #eff6ff; color: var(--blue); border-color: #bfdbfe; }

  /* Submit Button */
  .btn-submit {
    display: inline-flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 1rem; border-radius: 12px;
    background: var(--blue); color: white;
    font-family: 'Sora', sans-serif; font-size: 1.05rem; font-weight: 700;
    border: none; cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(26,86,219,0.3);
  }
  .btn-submit:hover {
    background: var(--navy-mid);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(26,86,219,0.4);
  }

</style>

<div class="db-wrap">

  <!-- ══════ HERO ══════ -->
  <div class="hero-banner">
    <div class="hero-grid"></div>
    <div class="hero-text">
      <p class="hero-eyebrow"><i class="fas fa-file-contract"></i> Official Tender Application</p>
      <h1 class="hero-title">{{ tender.title }}</h1>
    </div>
  </div>

  <!-- ══════ FORM PANEL ══════ -->
  <div class="panel">
    
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      
      <!-- Company Details -->
      <div class="form-section-title">
        <i class="fas fa-building" style="color:var(--blue-light);"></i> 1. Company Information
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Company Name</label>
          <input type="text" name="company_name" class="form-input" required placeholder="Registered Entity Name">
        </div>
        <div class="form-group">
          <label class="form-label">GST Number</label>
          <input type="text" name="gst_number" class="form-input" required placeholder="22AAAAA0000A1Z5">
        </div>
      </div>
      <div class="form-grid single" style="margin-bottom:1.25rem;">
        <div class="form-group">
          <label class="form-label">Registered Address</label>
          <textarea name="registered_address" class="form-textarea" required placeholder="Full street address"></textarea>
        </div>
      </div>
      <div class="form-grid" style="grid-template-columns: 1fr 1fr 1fr;">
        <div class="form-group">
          <label class="form-label">City</label>
          <input type="text" name="city" class="form-input" required placeholder="City">
        </div>
        <div class="form-group">
          <label class="form-label">State</label>
          <input type="text" name="state" class="form-input" required placeholder="State">
        </div>
        <div class="form-group">
          <label class="form-label">PIN Code</label>
          <input type="text" name="pin_code" class="form-input" required placeholder="000000">
        </div>
      </div>
      <div class="form-grid single">
        <div class="form-group">
          <label class="form-label">Upload GST Certificate (PDF)</label>
          <input type="file" name="gst_document" class="form-control-file" accept=".pdf,.jpeg,.jpg,.png" required>
        </div>
      </div>

      <!-- Bidder Details -->
      <div class="form-section-title">
        <i class="fas fa-user-tie" style="color:#f59e0b;"></i> 2. Authorized Representative
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Bidder Name</label>
          <input type="text" name="bidder_name" class="form-input" required placeholder="Full Name">
        </div>
        <div class="form-group">
          <label class="form-label">Designation</label>
          <input type="text" name="designation" class="form-input" required placeholder="e.g. Director / Manager">
        </div>
        <div class="form-group">
          <label class="form-label">Official Email</label>
          <input type="email" name="email" class="form-input" required placeholder="email@company.com">
        </div>
        <div class="form-group">
          <label class="form-label">Mobile Number</label>
          <input type="tel" name="mobile" class="form-input" required placeholder="+91">
        </div>
      </div>

      <!-- Financial Statements -->
      <div class="form-section-title">
        <i class="fas fa-file-invoice-dollar" style="color:#10b981;"></i> 3. Financial Statements
      </div>
      <div class="form-grid single">
        <div class="form-group">
          <label class="form-label">CA Certified Financial Statement (Last 3 Years)</label>
          <input type="file" name="financial_statement" class="form-control-file" accept=".pdf" required>
        </div>
      </div>

      <!-- Bidding Details -->
      <div class="form-section-title">
        <i class="fas fa-gavel" style="color:#6366f1;"></i> 4. Proposal Documents & Core Bid
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Proposed Bid Amount (₹)</label>
          <input type="number" name="bid_amount" class="form-input" required placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Technical Proposal</label>
          <input type="file" name="technical_document" class="form-control-file" accept=".pdf" required>
        </div>
        <div class="form-group">
          <label class="form-label">Financial Proposal</label>
          <input type="file" name="financial_document" class="form-control-file" accept=".pdf" required>
        </div>
        <div class="form-group">
          <label class="form-label">Supporting Documents (Experience / Portfolio)</label>
          <input type="file" name="other_document" class="form-control-file" accept=".pdf,.zip">
        </div>
      </div>

      <!-- Submit -->
      <div style="margin-top:3rem;">
        <button type="submit" class="btn-submit">
          <i class="fas fa-paper-plane"></i> Submit Official Tender Application
        </button>
      </div>
      
    </form>
  </div>

</div>

{% endblock %}
