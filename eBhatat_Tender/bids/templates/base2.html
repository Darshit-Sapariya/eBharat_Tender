{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CreatorDashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            overflow-x: hidden;
        }

        /* Navbar height spacing */
        .content-wrapper {
            padding-top: 80px;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #fff;
            border-right: 1px solid #ddd;
            transition: all 0.3s ease;
            z-index: 1050;
        }

        .sidebar a {
            text-decoration: none;
            display: block;
            padding: 12px 20px;
            color: #333;
            font-weight: 500;
            transition: 0.2s;
        }

        .sidebar a:hover {
            background: #f1f1f1;
        }

        .sidebar .logout {
            color: red;
        }

        /* Main content */
        .main-content {
            margin-left: 250px;
            transition: 0.3s;
        }

        /* Overlay for mobile */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100%;
            background: rgba(0,0,0,0.4);
            display: none;
            z-index: 1040;
        }

        /* Mobile view */
        @media(max-width: 991px) {
            .sidebar {
                left: -250px;
            }

            .sidebar.active {
                left: 0;
            }

            .main-content {
                margin-left: 0;
            }

            .overlay.active {
                display: block;
            }
        }
    </style>
</head>

<body>

<!-- Overlay -->
<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar p-3" id="sidebar">

    <div class="text-center mb-4">
        <a href="{% url 'tenders:dashboard' %}">
            <img src="{% static 'assets/images/logo/gov-logo.png' %}"
                 alt="logo"
                 class="img-fluid"
                 style="max-height:100px;">
        </a>
    </div>

    <div class="mb-3 text-muted small">ACTIONS</div>

    <a href="{% url 'bids:bidsdeshboard' %}" onclick="closeSidebar()">
        <i class="bi bi-speedometer2 me-2"></i> Dashboard
    </a>

    <a href="{% url 'bids:mybids' %}" onclick="closeSidebar()">
        <i class="bi bi-plus-circle me-2"></i> View My Bids
    </a>

    <a href="{% url 'accounts:updateProfile' %}" onclick="closeSidebar()">
        <i class="bi bi-person me-2"></i> My Profile
    </a>

    <a href="{% url 'accounts:logout' %}" class="logout" onclick="closeSidebar()">
        <i class="bi bi-box-arrow-right me-2"></i> Logout
    </a>

</div>

<!-- Main Content -->
<div class="main-content">

    <!-- Top Navbar -->
    <nav class="navbar navbar-light bg-white shadow-sm px-3 fixed-top">

        <button class="btn btn-outline-secondary d-lg-none"
                onclick="toggleSidebar()">
            <i class="bi bi-list"></i>
        </button>


        <div class="ms-auto dropdown">
            <a class="nav-link dropdown-toggle d-flex align-items-center"
               href="{% url 'accounts:logout' %}"
               role="button"
               data-bs-toggle="dropdown">

                {% if user.userprofile.profile_pic %}
                    <img src="{{ user.userprofile.profile_pic.url }}"
                         class="rounded-circle"
                         width="40"
                         height="40">
                {% else %}
                    <img src="{% static 'assets/images/users/default.png' %}"
                         class="rounded-circle"
                         width="40"
                         height="40">
                {% endif %}

                <span class="ms-2 d-none d-lg-inline text-dark">
                    {{ user.username }}
                </span>
            </a>
        </div>
    </nav>

    <!-- Page Content -->
    <div class="container-fluid content-wrapper px-3 px-md-4">
        {% block content %}
        {% endblock %}
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    function toggleSidebar() {
        document.getElementById("sidebar").classList.toggle("active");
        document.getElementById("overlay").classList.toggle("active");
    }

    function closeSidebar() {
        document.getElementById("sidebar").classList.remove("active");
        document.getElementById("overlay").classList.remove("active");
    }
</script>

</body>
</html>
