{% extends "base.html" %}
{% load static %}
{% block content %}
<style>
  :root { --navy: #0f2a5e; --blue: #1a56db; --surface: #f1f5f9; --text: #1e293b; --muted: #64748b; --border: #e2e8f0; }
  .login-page { height: calc(100vh - 66px); min-height: 580px; background: var(--surface); display: flex; align-items: center; justify-content: center; padding: 1rem; box-sizing: border-box; }
  .login-card { width: 100%; max-width: 460px; background: white; border-radius: 18px; border: 1px solid #e2e8f0; box-shadow: 0 6px 32px rgba(15,42,94,0.1); overflow: hidden; }
  .card-top { background: linear-gradient(135deg, #0b1e4a 0%, #0f2a5e 55%, #163472 100%); padding: 1.25rem 1.75rem; display: flex; align-items: center; gap: 0.9rem; position: relative; overflow: hidden; }
  .top-text { position: relative; z-index: 1; }
  .top-brand-name { font-family: 'Sora', sans-serif; font-size: 1.05rem; font-weight: 800; color: white; line-height: 1.2; margin-bottom: 2px; }
  .top-brand-sub { font-size: 0.63rem; color: rgba(255,255,255,0.45); font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; }
  .card-body { padding: 1.35rem 1.75rem 1.5rem; position: relative; overflow: hidden; text-align: center; }
  .form-heading { font-family: 'Sora', sans-serif; font-size: 1.18rem; font-weight: 800; color: var(--navy); margin-bottom: 0.5rem; line-height: 1.2; }
  .form-subheading { font-size: 0.8rem; color: var(--muted); margin-bottom: 1.1rem; line-height: 1.5; }
  .success-icon { font-size: 3rem; color: #22c55e; margin-bottom: 1rem; }
  .btn-login { width: 100%; padding: 0.7rem; background: linear-gradient(135deg, var(--navy) 0%, var(--blue) 100%); color: white; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: all 0.2s; text-decoration: none; display: inline-block; box-sizing: border-box;}
</style>
<div class="login-page">
  <div class="login-card">
    <div class="card-top">
      <div class="top-text">
        <p class="top-brand-name">eBharat Tender</p>
        <p class="top-brand-sub">Password Reset Complete</p>
      </div>
    </div>
    <div class="card-body">
      <div class="success-icon"><i class="fas fa-check-circle"></i></div>
      <h1 class="form-heading">Password reset successful</h1>
      <p class="form-subheading">Your password has been set. You may go ahead and log in now.</p>
      <br>
      <a href="{% url 'accounts:login' %}" class="btn-login">Log In Here</a>
    </div>
  </div>
</div>
{% endblock %}
